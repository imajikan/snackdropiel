<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Drop Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:#222;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
    background:linear-gradient(to bottom,#87CEEB,#dff6ff);
}

#ui{
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    z-index:10;
    text-shadow:2px 2px 5px black;
}

#ui h1{
    font-size:32px;
}

#ui p{
    font-size:20px;
}

#gameOver{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    color:white;
    z-index:100;
}

#gameOver button{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    font-size:24px;
    cursor:pointer;
}
</style>
</head>
<body>

<div id="ui">
    <h1>🍔 FOOD DROP</h1>
    <p>Score: <span id="score">0</span></p>
    <p>High Score: <span id="highScore">0</span></p>
    <p>Combo: <span id="combo">0</span>x</p>
    <p>Nyawa: <span id="lives">3</span></p>
    <p>Timer: <span id="timer">60</span>s</p>
</div>

<div id="gameOver">
    <h1>GAME OVER</h1>
    <h2 id="finalScore"></h2>
    <button onclick="restartGame()">Main Lagi</button>
</div>

<canvas id="game"></canvas>

<!-- SOUND -->
<audio id="eatSound">
<source src="https://assets.mixkit.co/active_storage/sfx/270/270-preview.mp3" type="audio/mpeg">
</audio>

<audio id="badSound">
<source src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// =======================
// UI
// =======================
const scoreEl = document.getElementById("score");
const comboEl = document.getElementById("combo");
const livesEl = document.getElementById("lives");
const timerEl = document.getElementById("timer");
const highScoreEl = document.getElementById("highScore");

// =======================
// SOUND
// =======================
const eatSound = document.getElementById("eatSound");
const badSound = document.getElementById("badSound");

// =======================
// GAME DATA
// =======================
let score = 0;
let combo = 0;
let lives = 3;
let timer = 60;
let gameOver = false;

let highScore =
localStorage.getItem("foodHighScore") || 0;

highScoreEl.innerText = highScore;

// =======================
// PLAYER
// =======================
const player = {
    x: canvas.width/2 - 60,
    y: canvas.height - 140,
    width:120,
    height:120,
    speed:8,
    eating:false,
    eatTimer:0
};

// =======================
// PLAYER IMAGES
// =======================
const mouthOpen = new Image();
mouthOpen.src = "mouth-open.png";

const mouthClosed = new Image();
mouthClosed.src = "mouth-close.png";

// =======================
// FOOD
// =======================
const goodFoods = [
    "🍔","🍕","🍟","🍩",
    "🍇","🍉","🍗","🍓",
    "🍣","🧁","🌮","🍪"
];

const badFoods = [
    "💀","☠️","🦠","🤢"
];

const foods = [];

// =======================
// SPAWN FOOD
// =======================
function spawnFood(){

    const isBad = Math.random() < 0.2;

    const emoji = isBad
        ? badFoods[Math.floor(Math.random()*badFoods.length)]
        : goodFoods[Math.floor(Math.random()*goodFoods.length)];

    foods.push({
        x: Math.random() * (canvas.width - 50),
        y: -50,
        size:50,
        speed:2 + Math.random()*3,
        emoji:emoji,
        bad:isBad
    });
}

// SPAWN LOOP
setInterval(()=>{
    if(!gameOver){
        spawnFood();
    }
},500);

// =======================
// KEYBOARD
// =======================
const keys = {};

window.addEventListener("keydown",(e)=>{
    keys[e.key] = true;
});

window.addEventListener("keyup",(e)=>{
    keys[e.key] = false;
});

// =======================
// TOUCH MOBILE
// =======================
canvas.addEventListener("touchmove",(e)=>{

    const touchX = e.touches[0].clientX;

    player.x = touchX - player.width/2;

});

// =======================
// TIMER
// =======================
setInterval(()=>{

    if(gameOver) return;

    timer--;

    timerEl.innerText = timer;

    if(timer <= 0){
        endGame();
    }

},1000);

// =======================
// UPDATE
// =======================
function update(){

    // MOVE
    if(keys["ArrowLeft"] || keys["a"]){
        player.x -= player.speed;
    }

    if(keys["ArrowRight"] || keys["d"]){
        player.x += player.speed;
    }

    // LIMIT
    if(player.x < 0){
        player.x = 0;
    }

    if(player.x + player.width > canvas.width){
        player.x = canvas.width - player.width;
    }

    // EAT TIMER
    if(player.eatTimer > 0){
        player.eatTimer--;
    }else{
        player.eating = false;
    }

    // UPDATE FOOD
    for(let i = foods.length-1; i >= 0; i--){

        let food = foods[i];

        food.y += food.speed;

        // COLLISION
        if(
            food.x < player.x + player.width &&
            food.x + food.size > player.x &&
            food.y < player.y + player.height &&
            food.y + food.size > player.y
        ){

            foods.splice(i,1);

            player.eating = true;
            player.eatTimer = 10;

            // BAD FOOD
            if(food.bad){

                badSound.currentTime = 0;
                badSound.play();

                combo = 0;
                lives--;

                comboEl.innerText = combo;
                livesEl.innerText = lives;

                if(lives <= 0){
                    endGame();
                }

            }else{

                eatSound.currentTime = 0;
                eatSound.play();

                combo++;

                score += combo * 10;

                scoreEl.innerText = score;
                comboEl.innerText = combo;

                // HIGH SCORE
                if(score > highScore){

                    highScore = score;

                    localStorage.setItem(
                        "foodHighScore",
                        highScore
                    );

                    highScoreEl.innerText = highScore;
                }
            }
        }

        // MISSED FOOD
        else if(food.y > canvas.height){

            foods.splice(i,1);

            if(!food.bad){

                combo = 0;
                lives--;

                comboEl.innerText = combo;
                livesEl.innerText = lives;

                if(lives <= 0){
                    endGame();
                }
            }
        }
    }
}

// =======================
// DRAW
// =======================
function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    // PLAYER
    const currentImage =
        player.eating
        ? mouthClosed
        : mouthOpen;

    // FALLBACK jika image gagal load
    if(currentImage.complete){

        ctx.drawImage(
            currentImage,
            player.x,
            player.y,
            player.width,
            player.height
        );

    }else{

        ctx.fillStyle = "red";
        ctx.fillRect(
            player.x,
            player.y,
            player.width,
            player.height
        );
    }

    // FOOD
    ctx.font = "40px Arial";

    foods.forEach(food=>{

        ctx.fillText(
            food.emoji,
            food.x,
            food.y
        );

    });
}

// =======================
// GAME LOOP
// =======================
function gameLoop(){

    if(!gameOver){

        update();
        draw();

        requestAnimationFrame(gameLoop);
    }
}

gameLoop();

// =======================
// GAME OVER
// =======================
function endGame(){

    gameOver = true;

    document.getElementById("gameOver").style.display = "flex";

    document.getElementById("finalScore").innerText =
        "Score: " + score;
}

// =======================
// RESTART
// =======================
function restartGame(){
    location.reload();
}

// =======================
// RESIZE
// =======================
window.addEventListener("resize",()=>{

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    player.y = canvas.height - 140;

});
</script>

</body>
</html>
